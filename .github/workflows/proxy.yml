name: MTProxy Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git
          pip3 install cryptography

      - name: Clone MTProto Proxy
        run: |
          git clone https://github.com/alexbers/mtprotoproxy
          cd mtprotoproxy
          echo "PORT = 443" > config.py
          echo "USERS = {" >> config.py
          echo "    'tg': '00000000000000000000000000000000'," >> config.py
          echo "}" >> config.py
          echo "TLS_DOMAIN = 'cloudflare.com'" >> config.py

      - name: Run proxy and get link
        run: |
          cd mtprotoproxy
          python3 mtprotoproxy.py &
          sleep 3
          IP=$(curl -s ifconfig.me)
          SECRET="00000000000000000000000000000000"
          echo "tg://proxy?server=$IP&port=443&secret=$SECRET" > proxy.txt
          cat proxy.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-link
          path: mtprotoproxy/proxy.txt