name: Generate MTProxy

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Docker and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io docker-compose curl
          sudo systemctl start docker

      - name: Run MTProto Proxy
        run: |
          git clone https://github.com/alexbers/mtprotoproxy
          cd mtprotoproxy
          sudo docker build -t mtprotoproxy .
          sudo docker run -d --network=host --name=mtproto mtprotoproxy
          sleep 5

      - name: Extract proxy link
        run: |
          SERVER_IP=$(curl -s ifconfig.me)
          PORT=$(sudo docker exec mtproto python3 -c "import config; print(config.PORT)" 2>/dev/null || echo "443")
          SECRET=$(sudo docker exec mtproto python3 -c "import config; print(config.TG_SECRET)" 2>/dev/null || echo "00000000000000000000000000000000")
          echo "tg://proxy?server=$SERVER_IP&port=$PORT&secret=$SECRET" > proxy_link.txt
          echo "Proxy link generated:"
          cat proxy_link.txt

      - name: Upload proxy link as artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-proxy
          path: proxy_link.txt

      - name: Save to repository (optional)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp proxy_link.txt proxy_history.txt
          git add proxy_history.txt
          git commit -m "Update proxy" || echo "No changes"
          git push || echo "Push failed"
